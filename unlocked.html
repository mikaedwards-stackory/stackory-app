<!DOCTYPE html>
<html>
<head>
  <title>STACKORY™ ARTIFACT</title>

  <style>
    body {
      background:#000;
      color:#fff;
      font-family:-apple-system;
      max-width:900px;
      margin:auto;
      padding:30px;
    }

    h1 { color:gold; text-align:center; }

    .matrix {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:20px;
      margin-top:20px;
    }

    .panel {
      border:2px solid gold;
      padding:20px;
      border-radius:12px;
      background:#0a0a0a;
    }

    .full {
      grid-column: span 2;
      text-align:center;
    }

    .score {
      font-size:48px;
      color:gold;
    }

    .title {
      color:gold;
      margin-bottom:10px;
    }
  </style>
</head>

<body>

<h1>STACKORY™ ARTIFACT</h1>

<div id="report"></div>

<script>

const user = JSON.parse(localStorage.getItem("stackory_user"));

if(!user){
  document.body.innerHTML = "ACCESS DENIED";
}

const pathways = {
ENGINEERING:["FE","EIT","PE"],
PM:["CAPM","PMP"],
OPS:["SSGB","CSCP","CSP"],
HEALTH:["CNA","RN","NP"],
LEGAL:["JD","BAR","CIPP"]
};

let domain = Object.keys(pathways).find(d =>
  pathways[d].includes(user.cert)
);

let path = pathways[domain] || [];
let index = path.indexOf(user.cert);

let next = path[index + 1] || "TOP";

let risk = user.score < 50 ? "HIGH" : "LOW";
let signal = user.score >= 70 ? "STRONG" : "WEAK";

let access = user.score >= 80 ? "EXECUTIVE" :
             user.score >= 60 ? "BOARDROOM" :
             user.score >= 40 ? "CONDITIONAL" :
             "DENIED";

document.getElementById("report").innerHTML = `

<div class="matrix">

  <div class="panel full">
    <div class="score">${user.score}</div>
    STACKORY™ INDEX
  </div>

  <div class="panel">
    <div class="title">PATHWAY</div>
    ${path.map(p => p===user.cert ? `[${p}]` : p).join(" → ")}
  </div>

  <div class="panel">
    <div class="title">NEXT MOVE</div>
    ${next}
  </div>

  <div class="panel">
    <div class="title">POSITION RISK</div>
    ${risk}
  </div>

  <div class="panel">
    <div class="title">MARKET SIGNAL</div>
    ${signal}
  </div>

  <div class="panel">
    <div class="title">ACCESS LEVEL</div>
    ${access}
  </div>

</div>

`;

</script>

</body>
</html>
