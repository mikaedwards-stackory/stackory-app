<!DOCTYPE html>
<html>
<head>
  <title>STACKORY™ ARTIFACT</title>

  <style>
    body {
      background:#000;
      color:#fff;
      font-family:-apple-system, sans-serif;
      max-width:900px;
      margin:auto;
      padding:30px;
    }

    h1 {
      color:gold;
      text-align:center;
    }

    .card {
      border:2px solid gold;
      border-radius:12px;
      padding:20px;
      margin-top:20px;
      background:#0a0a0a;
    }

    .row {
      display:flex;
      justify-content:space-between;
      padding:10px 0;
      border-bottom:1px solid #222;
    }

    .label { color:#aaa; }
    .value { font-weight:bold; }

    .section-title {
      color:gold;
      margin-bottom:10px;
    }
  </style>
</head>

<body>

<h1>STACKORY™ ARTIFACT REPORT</h1>

<div id="report"></div>

<script>

// same cert data (simplified reuse)
const certData = {
  PMP:{name:"PMP", difficulty:8, salary:9, time:6},
  FE:{name:"FE", difficulty:7, salary:8, time:6},
  PE:{name:"PE", difficulty:9, salary:10, time:12},
  RN:{name:"RN", difficulty:6, salary:7, time:6},
  NP:{name:"NP", difficulty:9, salary:10, time:12},
  USMLE:{name:"Physician", difficulty:10, salary:10, time:24}
};

function getAccess(score){
  if(score>=85) return "EXECUTIVE";
  if(score>=70) return "BOARDROOM";
  if(score>=40) return "CONDITIONAL";
  return "RESTRICTED";
}

// LOAD USER DATA
const user = JSON.parse(localStorage.getItem("stackory_user"));

if(!user){
  document.getElementById("report").innerHTML =
    "<p>No data found. Please return to system.</p>";
}

// DERIVED LOGIC
const cert = user.cert;
const data = certData[cert] || {name:cert, difficulty:5, salary:5, time:3};
const access = getAccess(user.score);

// GAP LOGIC
let gap = "None";
if(data.difficulty > 7 && user.exp === "0-1"){
  gap = "Experience gap for certification difficulty";
}

// TIMELINE
let timeline = `${data.time} months estimated completion`;

// AUTHORITY SIGNAL
let authority = data.salary >= 9 ? "High Market Authority" : "Moderate Authority";

// RENDER REPORT
document.getElementById("report").innerHTML = `

<div class="card">
  <div class="section-title">CREDENTIAL CLASSIFICATION</div>

  <div class="row">
    <div class="label">Certification</div>
    <div class="value">${data.name}</div>
  </div>

  <div class="row">
    <div class="label">Experience Level</div>
    <div class="value">${user.exp}</div>
  </div>

  <div class="row">
    <div class="label">Access Tier</div>
    <div class="value">${access}</div>
  </div>
</div>

<div class="card">
  <div class="section-title">GAPS DETECTED</div>
  <div>${gap}</div>
</div>

<div class="card">
  <div class="section-title">EXECUTION TIMELINE</div>
  <div>${timeline}</div>
</div>

<div class="card">
  <div class="section-title">AUTHORITY SIGNAL</div>
  <div>${authority}</div>
</div>

`;
</script>

</body>
</html>
