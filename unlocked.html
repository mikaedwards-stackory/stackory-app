<!DOCTYPE html>
<html>
<head>
  <title>STACKORY™ ARTIFACT</title>

  <style>
    body {
      background:#000;
      color:#fff;
      font-family:-apple-system, sans-serif;
      max-width:1000px;
      margin:auto;
      padding:30px;
    }

    h1 {
      color:gold;
      text-align:center;
      margin-bottom:10px;
    }

    .status {
      text-align:center;
      color:gold;
      font-size:12px;
      letter-spacing:2px;
      margin-bottom:30px;
    }

    .matrix {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:20px;
    }

    .panel {
      border:2px solid gold;
      border-radius:12px;
      padding:20px;
      background:#0a0a0a;
    }

    .full {
      grid-column: span 2;
    }

    .title {
      color:gold;
      font-size:14px;
      margin-bottom:10px;
      letter-spacing:1px;
    }

    .row {
      display:flex;
      justify-content:space-between;
      padding:8px 0;
      border-bottom:1px solid #222;
    }

    .label { color:#888; }
    .value { font-weight:bold; }

    .score {
      text-align:center;
      font-size:48px;
      margin:10px 0;
      color:gold;
    }

    .badge {
      text-align:center;
      padding:8px;
      border-radius:20px;
      margin-bottom:10px;
      font-weight:bold;
    }

  </style>
</head>

<body>

<h1>STACKORY™ ARTIFACT</h1>
<div class="status">CREDENTIAL INTELLIGENCE SYSTEM</div>

<div id="report"></div>

<script>

// 🔒 ACCESS GUARD
const user = JSON.parse(localStorage.getItem("stackory_user"));

if(!user){
  document.body.innerHTML = `
    <div style="text-align:center; margin-top:100px;">
      <h2 style="color:gold;">Access Restricted</h2>
      <a href="/" style="color:gold;">Return</a>
    </div>
  `;
}

// DATA
const certData = {
  PMP:{name:"PMP", difficulty:8, salary:9, time:6},
  FE:{name:"FE", difficulty:7, salary:8, time:6},
  PE:{name:"PE", difficulty:9, salary:10, time:12},
  RN:{name:"RN", difficulty:6, salary:7, time:6},
  NP:{name:"NP", difficulty:9, salary:10, time:12},
  USMLE:{name:"Physician", difficulty:10, salary:10, time:24}
};

function getAccess(score){
  if(score>=85) return {label:"EXECUTIVE", color:"gold"};
  if(score>=70) return {label:"BOARDROOM", color:"#fff"};
  if(score>=40) return {label:"CONDITIONAL", color:"gray"};
  return {label:"RESTRICTED", color:"red"};
}

// LOAD
const cert = user.cert;
const exp = user.exp;
const hours = parseInt(user.hours);
const score = user.score;

const data = certData[cert] || {name:cert, difficulty:5, salary:5, time:3};
const access = getAccess(score);

// GAP LOGIC
let gap = "No major gaps detected";

if(data.difficulty >= 8 && exp === "0-1"){
  gap = "Experience misalignment with certification level";
}

if(score < 50){
  gap = "Low readiness score impacts positioning";
}

// TIMELINE
let timeline = hours >= 12
  ? `${data.time} months (accelerated)`
  : `${data.time + 2}–${data.time + 6} months`;

// AUTHORITY
let authority = data.salary >= 9
  ? "High Authority Signal"
  : "Moderate Authority Signal";

// RENDER MATRIX
document.getElementById("report").innerHTML = `

<div class="matrix">

  <!-- SCORE PANEL -->
  <div class="panel full">
    <div class="badge" style="
      background:${access.color === "gold" ? "gold" : "#222"};
      color:${access.color === "gold" ? "#000" : access.color};
    ">
      ${access.label}
    </div>

    <div class="score">${score}</div>

    <div style="text-align:center; color:#aaa;">
      STACKORY™ INDEX
    </div>
  </div>

  <!-- CREDENTIAL -->
  <div class="panel">
    <div class="title">CREDENTIAL</div>

    <div class="row">
      <div class="label">Certification</div>
      <div class="value">${data.name}</div>
    </div>

    <div class="row">
      <div class="label">Experience</div>
      <div class="value">${exp}</div>
    </div>
  </div>

  <!-- AUTHORITY -->
  <div class="panel">
    <div class="title">AUTHORITY SIGNAL</div>

    <div class="row">
      <div class="label">Market Value</div>
      <div class="value">${data.salary}/10</div>
    </div>

    <div class="row">
      <div class="label">Signal</div>
      <div class="value">${authority}</div>
    </div>
  </div>

  <!-- GAPS -->
  <div class="panel">
    <div class="title">GAPS DETECTED</div>
    <div>${gap}</div>
  </div>

  <!-- TIMELINE -->
  <div class="panel">
    <div class="title">EXECUTION TIMELINE</div>
    <div>${timeline}</div>
  </div>

</div>
`;

</script>

</body>
</html>
