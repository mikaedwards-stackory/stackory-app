<!DOCTYPE html>
<html>
<head>
  <title>STACKORY™ ARTIFACT</title>

  <style>
    body {
      background:#000;
      color:#fff;
      font-family:-apple-system;
      max-width:1000px;
      margin:auto;
      padding:30px;
    }

    h1 {
      color:gold;
      text-align:center;
      margin-bottom:10px;
    }

    .status {
      text-align:center;
      color:gold;
      font-size:12px;
      letter-spacing:2px;
      margin-bottom:30px;
    }

    .matrix {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:20px;
    }

    .panel {
      border:2px solid gold;
      border-radius:12px;
      padding:20px;
      background:#0a0a0a;
    }

    .full {
      grid-column: span 2;
    }

    .title {
      color:gold;
      font-size:14px;
      margin-bottom:10px;
    }

    .score {
      text-align:center;
      font-size:48px;
      color:gold;
    }

    .badge {
      text-align:center;
      padding:8px;
      border-radius:20px;
      margin-bottom:10px;
      font-weight:bold;
    }
  </style>
</head>

<body>

<h1>STACKORY™ ARTIFACT</h1>
<div class="status">CREDENTIAL INTELLIGENCE SYSTEM</div>

<div id="report"></div>

<script>

// 🔒 ACCESS GUARD
const user = JSON.parse(localStorage.getItem("stackory_user"));

if(!user){
  document.body.innerHTML = `
    <div style="text-align:center; margin-top:100px;">
      <h2 style="color:gold;">Access Restricted</h2>
      <a href="/" style="color:gold;">Return</a>
    </div>
  `;
}

// 🔥 DATA
const certData = {
  CNA:"Certified Nursing Assistant",
  LPN:"Licensed Practical Nurse",
  RN:"Registered Nurse",
  BSN:"Bachelor of Science in Nursing",
  NP:"Nurse Practitioner",
  CRA:"Clinical Research Associate",
  FE:"Fundamentals of Engineering",
  PE:"Professional Engineer",
  PMP:"Project Management Professional",
  GOOGLE_PM:"Google Project Management"
};

// 🔥 PATHWAYS
const pathways = {
  HEALTH:["CNA","LPN","RN","BSN","NP"],
  ENGINEERING:["FE","PE"],
  PM:["GOOGLE_PM","PMP"]
};

// 🔥 ACCESS
function getAccess(score){
  if(score>=85) return {label:"EXECUTIVE", color:"gold"};
  if(score>=70) return {label:"BOARDROOM", color:"#fff"};
  if(score>=40) return {label:"CONDITIONAL", color:"gray"};
  return {label:"RESTRICTED", color:"red"};
}

// LOAD USER
const cert = user.cert;
const exp = user.exp;
const score = user.score;

// FIND DOMAIN
let domain = Object.keys(pathways).find(d => pathways[d].includes(cert));

// PATH LOGIC
const path = pathways[domain] || [];
const index = path.indexOf(cert);

// VISUAL PATH
const visualPath = path.map(p => {
  if(p === cert) return `[ ${p} ]`;
  return p;
}).join(" → ");

// NEXT STEP
const next = path[index + 1] || "Top Tier";

const nextMessage = next === "Top Tier"
  ? "You are at the highest level of this pathway"
  : `${next} — required to unlock next-tier positioning`;

// RISK
let risk = "Low";
if(index > 1 && exp === "0-1") risk = "High";
if(score < 50) risk = "Elevated";

// ROADMAP
let roadmap = "";
path.slice(index + 1).forEach((step, i) => {
  roadmap += `<p>Step ${i+1}: ${step}</p>`;
});

// ACCESS
const access = getAccess(score);

// RENDER
document.getElementById("report").innerHTML = `

<div class="matrix">

  <div class="panel full">
    <div class="badge" style="
      background:${access.color === "gold" ? "gold" : "#222"};
      color:${access.color === "gold" ? "#000" : access.color};
    ">
      ${access.label}
    </div>

    <div class="score">${score}</div>

    <div style="text-align:center; color:#aaa;">
      STACKORY™ INDEX
    </div>
  </div>

  <div class="panel">
    <div class="title">CURRENT POSITION</div>
    <p>${cert} — ${certData[cert]}</p>
  </div>

  <div class="panel">
    <div class="title">PATHWAY</div>
    <p>${visualPath}</p>
  </div>

  <div class="panel">
    <div class="title">NEXT REQUIRED MOVE</div>
    <p>${nextMessage}</p>
  </div>

  <div class="panel">
    <div class="title">EXECUTION ROADMAP</div>
    ${roadmap || "No further steps required"}
  </div>

  <div class="panel">
    <div class="title">RISK LEVEL</div>
    <p>${risk}</p>
  </div>

</div>
`;
</script>

</body>
</html>
