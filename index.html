<!DOCTYPE html>
<html>
<head>
  <title>STACKORY™ SYSTEM</title>

  <style>
    body {
      background:#000;
      color:#fff;
      font-family:-apple-system;
      max-width:650px;
      margin:auto;
      padding:30px;
    }

    h2 { text-align:center; color:gold; }

    select, button {
      width:100%;
      padding:14px;
      margin-bottom:15px;
      border-radius:8px;
      border:none;
      background:#111;
      color:#fff;
    }

    button {
      background:gold;
      color:black;
      font-weight:bold;
      cursor:pointer;
    }

    #output {
      display:none;
      margin-top:20px;
      border:2px solid gold;
      padding:20px;
      border-radius:12px;
    }

    .artifact {
      margin-top:20px;
      padding:15px;
      border:2px solid gold;
      border-radius:12px;
      background:#0a0a0a;
    }

    .locked {
      color:#666;
      font-size:12px;
      text-align:center;
    }
  </style>
</head>

<body>

<h2>STACKORY™ SYSTEM</h2>

<select id="domain" onchange="updateCerts()">
  <option value="">Select Domain</option>
  <option value="HEALTH">Healthcare</option>
  <option value="ENGINEERING">Engineering</option>
  <option value="PM">Project Management</option>
</select>

<select id="cert">
  <option value="">Select Certification</option>
</select>

<select id="experience">
  <option value="">Experience</option>
  <option value="0-1">0–1 years</option>
  <option value="2-3">2–3 years</option>
  <option value="4-6">4–6 years</option>
  <option value="7+">7+ years</option>
</select>

<select id="hours">
  <option value="">Study Hours</option>
  <option value="3">2–4 hrs</option>
  <option value="7">5–8 hrs</option>
  <option value="12">9–12 hrs</option>
</select>

<button onclick="generate()">ASSIGN POSITION</button>

<div id="output"></div>

<script>

// 🔥 CERT DATA
const certData = {
  CNA:"Certified Nursing Assistant",
  LPN:"Licensed Practical Nurse",
  RN:"Registered Nurse",
  BSN:"Bachelor of Science in Nursing",
  NP:"Nurse Practitioner",
  CRA:"Clinical Research Associate",

  FE:"Fundamentals of Engineering",
  PE:"Professional Engineer",

  PMP:"Project Management Professional",
  GOOGLE_PM:"Google Project Management"
};

// 🔥 PATHWAYS (THIS IS THE ENGINE)
const pathways = {
  HEALTH:["CNA","LPN","RN","BSN","NP"],
  ENGINEERING:["FE","PE"],
  PM:["GOOGLE_PM","PMP"]
};

// 🔥 DROPDOWN
function updateCerts(){
  const domain = document.getElementById("domain").value;
  const cert = document.getElementById("cert");

  cert.innerHTML = `<option value="">Select Certification</option>`;

  pathways[domain]?.forEach(c=>{
    cert.innerHTML += `<option value="${c}">
      ${c} — ${certData[c]}
    </option>`;
  });
}

// 🔥 SCORE
function computeScore(exp,hours){
  let score = 0;

  if(exp==="0-1") score+=10;
  if(exp==="2-3") score+=20;
  if(exp==="4-6") score+=30;
  if(exp==="7+") score+=40;

  if(hours>=12) score+=30;
  else if(hours>=7) score+=20;
  else score+=10;

  return score;
}

// 🔥 PATHWAY INTELLIGENCE
function getPathInsights(domain, cert, exp){

  const path = pathways[domain];
  const index = path.indexOf(cert);

  let next = path[index + 1] || "Top Tier";
  let prev = path[index - 1];

  let warning = "";
  let insight = "";

  // SKIP DETECTION
  if(index > 1 && exp === "0-1"){
    warning = "⚠ You may be skipping foundational steps in this pathway";
  }

  // TRANSITION LOGIC
  if(cert === "CRA" && exp === "0-1"){
    insight = "✓ Transition detected: Research support → Clinical research pathway";
  }

  if(cert === "NP" && exp === "0-1"){
    warning = "⚠ RN/BSN typically required before NP";
  }

  return {
    next,
    prev,
    warning,
    insight,
    path: path.join(" → ")
  };
}

// 🔥 MAIN
function generate(){

  const domain = document.getElementById("domain").value;
  const cert = document.getElementById("cert").value;
  const exp = document.getElementById("experience").value;
  const hours = parseInt(document.getElementById("hours").value);

  if(!cert || !exp || !hours){
    alert("Complete all fields");
    return;
  }

  const score = computeScore(exp,hours);
  const insights = getPathInsights(domain, cert, exp);

  const output = document.getElementById("output");
  output.style.display = "block";

  output.innerHTML = `

    <h3 style="color:gold;">STACKORY™ POSITION</h3>

    <p><strong>Score:</strong> ${score}</p>
    <p><strong>Selected:</strong> ${cert} — ${certData[cert]}</p>

    <div class="artifact">
      <h4 style="color:gold;">PATHWAY</h4>
      <p>${insights.path}</p>
    </div>

    <div class="artifact">
      <h4 style="color:gold;">NEXT BEST MOVE</h4>
      <p>${insights.next}</p>
    </div>

    <div class="artifact">
      <h4 style="color:gold;">POSITIONING SIGNAL</h4>
      <p>${insights.insight || "Aligned with pathway"}</p>
      <p style="color:red;">${insights.warning}</p>
    </div>

    <div class="locked">
      Full execution strategy locked 🔒
    </div>

    <br>

    <button onclick="checkout()">UNLOCK FULL STRATEGY</button>
  `;
}

// 🔥 CHECKOUT
function checkout(){
  window.location.href="https://buy.stripe.com/28E9AM2jP4NnanG6tY3gk0d";
}

</script>

</body>
</html>
