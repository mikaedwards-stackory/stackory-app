<!DOCTYPE html>
<html>
<head>
  <title>STACKORY™ SYSTEM</title>

  <style>
    body {
      background:#000;
      color:#fff;
      font-family:-apple-system;
      max-width:650px;
      margin:auto;
      padding:30px;
    }

    h2 { text-align:center; color:gold; }

    select, button {
      width:100%;
      padding:14px;
      margin-bottom:15px;
      border-radius:8px;
      border:none;
      background:#111;
      color:#fff;
    }

    button {
      background:gold;
      color:black;
      font-weight:bold;
      cursor:pointer;
    }

    #output {
      display:none;
      margin-top:20px;
      border:2px solid gold;
      padding:20px;
      border-radius:12px;
    }

    .artifact {
      margin-top:15px;
      padding:15px;
      border:2px solid gold;
      border-radius:12px;
      background:#0a0a0a;
    }

    .progress-bar {
      width:100%;
      background:#111;
      border-radius:10px;
      overflow:hidden;
      margin-top:10px;
    }

    .progress-fill {
      height:10px;
      background:gold;
    }

    .locked {
      color:#666;
      text-align:center;
      font-size:12px;
      margin-top:10px;
    }
  </style>
</head>

<body>

<h2>STACKORY™ SYSTEM</h2>

<select id="domain" onchange="updateCerts()">
  <option value="">DOMAIN</option>
  <option value="ENGINEERING">ENGINEERING</option>
  <option value="PM">PROJECT MANAGEMENT</option>
  <option value="DESIGN">DESIGN</option>
  <option value="MARKETING">MARKETING</option>
  <option value="ESG">ESG</option>
  <option value="OPS">OPERATIONS</option>
  <option value="DATA">DATA</option>
  <option value="HEALTH">HEALTHCARE</option>
</select>

<select id="cert">
  <option value="">CERTIFICATION</option>
</select>

<select id="experience">
  <option value="">EXPERIENCE</option>
  <option value="0-1">0–1</option>
  <option value="2-3">2–3</option>
  <option value="4-6">4–6</option>
  <option value="7+">7+</option>
</select>

<select id="hours">
  <option value="">STUDY CAPACITY</option>
  <option value="3">LOW</option>
  <option value="7">MEDIUM</option>
  <option value="12">HIGH</option>
</select>

<button onclick="generate()">ASSIGN POSITION</button>

<div id="output"></div>

<script>

const certData = {
  FE:"Fundamentals of Engineering",
  PE:"Professional Engineer",
  PMP:"Project Management Professional",
  GOOGLE_PM:"Google Project Management Certificate",
  GOOGLE_UX:"Google UX Design Certificate",
  ADOBE:"Adobe Certified Professional",
  HUBSPOT:"HubSpot Marketing Certification",
  GRI:"Global Reporting Initiative Certification",
  SSGB:"Six Sigma Green Belt",
  GOOGLE_DA:"Google Data Analytics Certificate",
  CNA:"Certified Nursing Assistant",
  LPN:"Licensed Practical Nurse",
  RN:"Registered Nurse",
  BSN:"Bachelor of Science in Nursing",
  NP:"Nurse Practitioner",
  CCRN:"Critical Care Registered Nurse",
  CRA:"Clinical Research Associate",
  USMLE:"United States Medical Licensing Examination"
};

const certMap = {
  ENGINEERING:["FE","PE"],
  PM:["GOOGLE_PM","PMP"],
  DESIGN:["GOOGLE_UX","ADOBE"],
  MARKETING:["HUBSPOT"],
  ESG:["GRI"],
  OPS:["SSGB"],
  DATA:["GOOGLE_DA"],
  HEALTH:["CNA","LPN","RN","BSN","NP","CCRN","CRA","USMLE"]
};

const pathways = {
  ENGINEERING:["FE","PE"],
  PM:["GOOGLE_PM","PMP"],
  DESIGN:["GOOGLE_UX","ADOBE"],
  MARKETING:["HUBSPOT"],
  ESG:["GRI"],
  OPS:["SSGB"],
  DATA:["GOOGLE_DA"],
  HEALTH:["CNA","LPN","RN","BSN","NP"]
};

function updateCerts(){
  const domain = document.getElementById("domain").value;
  const cert = document.getElementById("cert");

  cert.innerHTML = `<option value="">CERTIFICATION</option>`;

  certMap[domain]?.forEach(c=>{
    cert.innerHTML += `<option value="${c}">
      ${c} — ${certData[c]}
    </option>`;
  });
}

function computeScore(exp,hours){
  let score = 0;

  if(exp==="0-1") score+=10;
  if(exp==="2-3") score+=20;
  if(exp==="4-6") score+=30;
  if(exp==="7+") score+=40;

  if(hours>=12) score+=30;
  else if(hours>=7) score+=20;
  else score+=10;

  return score;
}

function getPathInsights(domain, cert, exp){

  const path = pathways[domain] || [];
  const index = path.indexOf(cert);

  let next = path[index + 1] || "TOP";
  let risk = "LOW";
  let signal = "ALIGNED";

  if(index > 1 && exp === "0-1") risk = "HIGH";
  if(cert === "NP" && exp === "0-1") risk = "HIGH";
  if(cert === "CRA" && exp === "0-1") signal = "TRANSITION";

  return {
    next,
    risk,
    signal,
    path: path.map(p => p === cert ? `[${p}]` : p).join(" → ")
  };
}

function generate(){

  const domain = document.getElementById("domain").value;
  const cert = document.getElementById("cert").value;
  const exp = document.getElementById("experience").value;
  const hours = parseInt(document.getElementById("hours").value);

  if(!cert || !exp || !hours){
    alert("INPUT REQUIRED");
    return;
  }

  const score = computeScore(exp,hours);
  const insights = getPathInsights(domain, cert, exp);

  const output = document.getElementById("output");
  output.style.display = "block";

  output.innerHTML = `

    <h3 style="color:gold;">STACKORY™ INDEX: ${score}</h3>

    <div class="progress-bar">
      <div class="progress-fill" style="width:${score}%"></div>
    </div>

    <div class="artifact">
      <div class="title">PATHWAY</div>
      <p>${insights.path}</p>
    </div>

    <div class="artifact">
      <div class="title">NEXT MOVE</div>
      <p>${insights.next}</p>
    </div>

    <div class="artifact">
      <div class="title">POSITION RISK</div>
      <p>${insights.risk}</p>
    </div>

    <div class="artifact">
      <div class="title">MARKET SIGNAL</div>
      <p>${insights.signal}</p>
    </div>

    <div class="locked">EXECUTION LOCKED</div>

    <br>

    <button onclick="checkout()">UNLOCK</button>
  `;
}

function checkout(){
  localStorage.setItem("stackory_user", JSON.stringify({
    cert: document.getElementById("cert").value,
    exp: document.getElementById("experience").value,
    hours: document.getElementById("hours").value,
    score: computeScore(
      document.getElementById("experience").value,
      parseInt(document.getElementById("hours").value)
    )
  }));

  window.location.href="https://buy.stripe.com/28E9AM2jP4NnanG6tY3gk0d";
}

</script>

</body>
</html>
