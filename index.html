<!DOCTYPE html>
<html>
<head>
  <title>STACKORY™ SYSTEM</title>

  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

  <style>
    body {
      background:#000;
      color:#fff;
      font-family:-apple-system;
      max-width:650px;
      margin:auto;
      padding:30px;
    }

    h2 { text-align:center; color:gold; }

    select, button {
      width:100%;
      padding:14px;
      margin-bottom:15px;
      border-radius:8px;
      border:none;
      background:#111;
      color:#fff;
    }

    button {
      background:gold;
      color:black;
      font-weight:bold;
      cursor:pointer;
    }

    #output {
      display:none;
      margin-top:20px;
      border:2px solid gold;
      padding:20px;
      border-radius:12px;
    }

    .artifact {
      margin-top:15px;
      padding:15px;
      border:2px solid gold;
      border-radius:12px;
      background:#0a0a0a;
    }

    .locked {
      color:#666;
      font-size:12px;
      text-align:center;
      margin-top:10px;
    }

    .progress-bar {
      width:100%;
      background:#111;
      border-radius:10px;
      overflow:hidden;
      margin-top:10px;
    }

    .progress-fill {
      height:10px;
      background:gold;
    }

  </style>
</head>

<body>

<h2>STACKORY™ SYSTEM</h2>

<select id="domain" onchange="updateCerts()">
  <option value="">Select Domain</option>
  <option value="ENGINEERING">Engineering</option>
  <option value="PM">Project Management</option>
  <option value="DESIGN">Design / UX</option>
  <option value="MARKETING">Marketing</option>
  <option value="ESG">ESG / Sustainability</option>
  <option value="OPS">Operations</option>
  <option value="DATA">Data & Analytics</option>
  <option value="HEALTH">Healthcare</option>
</select>

<select id="cert">
  <option value="">Select Certification</option>
</select>

<select id="experience">
  <option value="">Experience</option>
  <option value="0-1">0–1 years</option>
  <option value="2-3">2–3 years</option>
  <option value="4-6">4–6 years</option>
  <option value="7+">7+ years</option>
</select>

<select id="hours">
  <option value="">Study Hours</option>
  <option value="3">2–4 hrs</option>
  <option value="7">5–8 hrs</option>
  <option value="12">9–12 hrs</option>
</select>

<button onclick="generate()">ASSIGN POSITION</button>

<div id="output"></div>

<script>

// 🔥 CERT DATA (ACRONYM + FULL NAME)
const certData = {

  // ENGINEERING
  FE:"Fundamentals of Engineering",
  PE:"Professional Engineer",

  // PM
  PMP:"Project Management Professional",
  GOOGLE_PM:"Google Project Management Certificate",

  // DESIGN
  GOOGLE_UX:"Google UX Design Certificate",
  ADOBE:"Adobe Certified Professional",

  // MARKETING
  HUBSPOT:"HubSpot Marketing Certification",

  // ESG
  GRI:"Global Reporting Initiative Certification",

  // OPS
  SSGB:"Six Sigma Green Belt",

  // DATA
  GOOGLE_DA:"Google Data Analytics Certificate",

  // HEALTHCARE
  CNA:"Certified Nursing Assistant",
  LPN:"Licensed Practical Nurse",
  RN:"Registered Nurse",
  BSN:"Bachelor of Science in Nursing",
  NP:"Nurse Practitioner",
  CCRN:"Critical Care Registered Nurse",
  CRA:"Clinical Research Associate",
  USMLE:"United States Medical Licensing Examination"
};

// 🔥 DOMAIN MAP (FULL)
const certMap = {
  ENGINEERING:["FE","PE"],
  PM:["GOOGLE_PM","PMP"],
  DESIGN:["GOOGLE_UX","ADOBE"],
  MARKETING:["HUBSPOT"],
  ESG:["GRI"],
  OPS:["SSGB"],
  DATA:["GOOGLE_DA"],
  HEALTH:["CNA","LPN","RN","BSN","NP","CCRN","CRA","USMLE"]
};

// 🔥 PATHWAYS (FULL SYSTEM)
const pathways = {
  ENGINEERING:["FE","PE"],
  PM:["GOOGLE_PM","PMP"],
  DESIGN:["GOOGLE_UX","ADOBE"],
  MARKETING:["HUBSPOT"],
  ESG:["GRI"],
  OPS:["SSGB"],
  DATA:["GOOGLE_DA"],
  HEALTH:["CNA","LPN","RN","BSN","NP"]
};

// 🔥 DROPDOWN
function updateCerts(){
  const domain = document.getElementById("domain").value;
  const cert = document.getElementById("cert");

  cert.innerHTML = `<option value="">Select Certification</option>`;

  certMap[domain]?.forEach(c=>{
    cert.innerHTML += `<option value="${c}">
      ${c} — ${certData[c]}
    </option>`;
  });
}

// 🔥 SCORE
function computeScore(exp,hours){
  let score = 0;

  if(exp==="0-1") score+=10;
  if(exp==="2-3") score+=20;
  if(exp==="4-6") score+=30;
  if(exp==="7+") score+=40;

  if(hours>=12) score+=30;
  else if(hours>=7) score+=20;
  else score+=10;

  return score;
}

// 🔥 PATHWAY ENGINE
function getPathInsights(domain, cert, exp){

  const path = pathways[domain] || [];
  const index = path.indexOf(cert);

  let next = path[index + 1] || "Top Tier";
  let warning = "";
  let insight = "Aligned with pathway";

  // SKIP DETECTION
  if(index > 1 && exp === "0-1"){
    warning = "⚠ Potential pathway skip detected";
  }

  // HEALTHCARE LOGIC
  if(cert === "NP" && exp === "0-1"){
    warning = "⚠ RN/BSN typically required before NP";
  }

  if(cert === "CRA" && exp === "0-1"){
    insight = "✓ Transition: Research support → Clinical Research pathway";
  }

  return {
    next,
    warning,
    insight,
    path: path.join(" → ")
  };
}

// 🔥 MAIN
function generate(){

  const domain = document.getElementById("domain").value;
  const cert = document.getElementById("cert").value;
  const exp = document.getElementById("experience").value;
  const hours = parseInt(document.getElementById("hours").value);

  if(!cert || !exp || !hours){
    alert("Complete all fields");
    return;
  }

  const score = computeScore(exp,hours);
  const insights = getPathInsights(domain, cert, exp);

  const output = document.getElementById("output");
  output.style.display = "block";

  output.innerHTML = `

    <h3 style="color:gold;">STACKORY™ POSITION</h3>

    <p><strong>Score:</strong> ${score}</p>
    <p><strong>Certification:</strong> ${cert} — ${certData[cert]}</p>

    <div class="progress-bar">
      <div class="progress-fill" style="width:${score}%"></div>
    </div>

    <div class="artifact">
      <h4 style="color:gold;">PATHWAY</h4>
      <p>${insights.path || "Custom / Non-linear pathway"}</p>
    </div>

    <div class="artifact">
      <h4 style="color:gold;">NEXT BEST MOVE</h4>
      <p>${insights.next}</p>
    </div>

    <div class="artifact">
      <h4 style="color:gold;">POSITIONING SIGNAL</h4>
      <p>${insights.insight}</p>
      <p style="color:red;">${insights.warning}</p>
    </div>

    <div class="locked">
      Full execution strategy locked 🔒
    </div>

    <br>

    <button onclick="checkout()">UNLOCK FULL STRATEGY</button>
  `;
}

// 🔥 CHECKOUT
function checkout(){

  const data = {
    cert: document.getElementById("cert").value,
    exp: document.getElementById("experience").value,
    hours: document.getElementById("hours").value,
    score: computeScore(
      document.getElementById("experience").value,
      parseInt(document.getElementById("hours").value)
    )
  };

  localStorage.setItem("stackory_user", JSON.stringify(data));

  window.location.href="https://buy.stripe.com/28E9AM2jP4NnanG6tY3gk0d";
}

</script>

</body>
</html>
