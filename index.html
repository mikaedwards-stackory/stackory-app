<!DOCTYPE html>
<html>
<head>
  <title>STACKORY™ SYSTEM</title>

  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

  <style>
    body {
      background:#000;
      color:#fff;
      font-family:-apple-system, sans-serif;
      max-width:650px;
      margin:auto;
      padding:30px;
    }

    h2 { text-align:center; color:gold; }

    select, button {
      width:100%;
      padding:14px;
      margin-bottom:15px;
      border-radius:8px;
      border:none;
      background:#111;
      color:#fff;
    }

    button {
      background:gold;
      color:black;
      font-weight:bold;
      cursor:pointer;
    }

    #output {
      display:none;
      margin-top:25px;
      border:2px solid gold;
      padding:20px;
      border-radius:12px;
    }

    .row {
      display:flex;
      justify-content:space-between;
      padding:10px 0;
      border-bottom:1px solid #222;
    }

    .label { color:#aaa; }
    .value { font-weight:bold; }

    .badge {
      text-align:center;
      margin:15px 0;
      font-weight:bold;
      font-size:18px;
    }

    .snapshot {
      margin-top:20px;
      padding:20px;
      border:2px solid gold;
      border-radius:12px;
      text-align:center;
    }

    .artifact {
      margin-top:20px;
      padding:20px;
      border:2px solid gold;
      border-radius:12px;
      background:#0a0a0a;
    }

    .locked {
      text-align:center;
      color:#666;
      margin-top:10px;
      font-size:13px;
    }
  </style>
</head>

<body>

<h2>STACKORY™ SYSTEM</h2>

<select id="domain" onchange="updateCerts()">
  <option value="">Select Domain</option>
  <option value="ENGINEERING">Engineering</option>
  <option value="PM">Project Management</option>
  <option value="DESIGN">Design / UX</option>
  <option value="MARKETING">Marketing</option>
  <option value="ESG">ESG / Sustainability</option>
  <option value="OPS">Operations</option>
  <option value="DATA">Data & Analytics</option>
  <option value="HEALTH">Healthcare</option>
</select>

<select id="cert">
  <option value="">Select Certification</option>
</select>

<select id="experience">
  <option value="">Experience Level</option>
  <option value="0-1">0–1 years</option>
  <option value="2-3">2–3 years</option>
  <option value="4-6">4–6 years</option>
  <option value="7+">7+ years</option>
</select>

<select id="hours">
  <option value="">Weekly Study Commitment</option>
  <option value="3">Light (2–4 hrs/week)</option>
  <option value="7">Moderate (5–8 hrs/week)</option>
  <option value="12">Focused (9–12 hrs/week)</option>
  <option value="15">Accelerated (12+ hrs/week)</option>
</select>

<button onclick="generate()">ASSIGN POSITION</button>

<div id="output"></div>

<script>

// 🔥 CERT DATA (WITH FUTURE AI HOOKS)
const certData = {

  PMP:{name:"PMP", difficulty:8, salary:9, time:6},
  CAPM:{name:"CAPM", difficulty:5, salary:6, time:3},
  GOOGLE_PM:{name:"Google PM", difficulty:4, salary:5, time:2},

  GOOGLE_UX:{name:"Google UX", difficulty:5, salary:6, time:3},
  ADOBE:{name:"Adobe Certified Professional", difficulty:4, salary:5, time:2},

  HUBSPOT:{name:"HubSpot", difficulty:3, salary:5, time:1},

  GRI:{name:"GRI Certification", difficulty:6, salary:7, time:4},
  CFA_ESG:{name:"CFA ESG", difficulty:7, salary:8, time:5},

  SSGB:{name:"Six Sigma Green Belt", difficulty:6, salary:7, time:4},

  GOOGLE_DA:{name:"Google Data Analytics", difficulty:5, salary:7, time:3},

  FE:{name:"Fundamentals of Engineering", difficulty:7, salary:8, time:6},
  PE:{name:"Professional Engineer", difficulty:9, salary:10, time:12},

  CNA:{name:"CNA", difficulty:3, salary:4, time:2},
  LPN:{name:"LPN", difficulty:5, salary:6, time:4},
  RN:{name:"Registered Nurse", difficulty:6, salary:7, time:6},
  BSN:{name:"BSN", difficulty:7, salary:8, time:8},
  NP:{name:"Nurse Practitioner", difficulty:9, salary:10, time:12},
  CCRN:{name:"Critical Care RN", difficulty:8, salary:9, time:6},
  CRA:{name:"Clinical Research Associate", difficulty:7, salary:8, time:5},
  USMLE:{name:"Physician Pathway", difficulty:10, salary:10, time:24}

};

// DOMAIN MAP
const certMap = {
  ENGINEERING:["FE","PE"],
  PM:["PMP","CAPM","GOOGLE_PM"],
  DESIGN:["GOOGLE_UX","ADOBE"],
  MARKETING:["HUBSPOT"],
  ESG:["GRI","CFA_ESG"],
  OPS:["SSGB"],
  DATA:["GOOGLE_DA"],
  HEALTH:["CNA","LPN","RN","BSN","NP","CCRN","CRA","USMLE"]
};

// DROPDOWN
function updateCerts(){
  const domain = document.getElementById("domain").value;
  const cert = document.getElementById("cert");
  cert.innerHTML = `<option value="">Select Certification</option>`;

  certMap[domain]?.forEach(c=>{
    cert.innerHTML += `<option value="${c}">${certData[c].name}</option>`;
  });
}

// SCORE ENGINE
function computeScore(exp,hours){
  let score=0;

  if(exp==="0-1") score+=10;
  if(exp==="2-3") score+=20;
  if(exp==="4-6") score+=30;
  if(exp==="7+") score+=40;

  if(hours>=12) score+=30;
  else if(hours>=7) score+=20;
  else score+=10;

  return score;
}

// ACCESS
function getAccess(score){
  if(score>=85) return {label:"EXECUTIVE", color:"gold"};
  if(score>=70) return {label:"BOARDROOM", color:"#fff"};
  if(score>=40) return {label:"CONDITIONAL", color:"gray"};
  return {label:"NO ACCESS", color:"red"};
}

// 🔥 DYNAMIC ARTIFACT LOGIC
function buildArtifact(cert, exp){

  const data = certData[cert];

  let readiness = data.difficulty > 7 && exp === "0-1" ? "⚠ Advanced Track" : "✔ Aligned";

  return `
    <p>✔ Certification Complexity: ${data.difficulty}/10</p>
    <p>✔ Market Value Signal: ${data.salary}/10</p>
    <p>✔ Time Investment: ${data.time} months</p>
    <p>${readiness}</p>
  `;
}

// MAIN
function generate(){

  const cert = document.getElementById("cert").value;
  const exp = document.getElementById("experience").value;
  const hours = parseInt(document.getElementById("hours").value);

  if(!cert || !exp || !hours){
    alert("Complete all fields");
    return;
  }

  const score = computeScore(exp,hours);
  const access = getAccess(score);
  const artifactPreview = buildArtifact(cert, exp);

  const output = document.getElementById("output");
  output.style.display="block";

  output.innerHTML = `
    <div class="badge">Stackory™ Index: ${score}</div>

    <div class="row">
      <div class="label">Position Assigned</div>
      <div class="value">${certData[cert].name}</div>
    </div>

    <div class="row">
      <div class="label">Boardroom Access™</div>
      <div class="value" style="color:${access.color}">
        ${access.label}
      </div>
    </div>

    <div id="snapshot" class="snapshot">
      <h3 style="color:gold;">STACKORY™ SNAPSHOT</h3>
      <p>Index: ${score}</p>
      <p>Access: ${access.label}</p>
      <p>${certData[cert].name}</p>
    </div>

    <button onclick="downloadSnapshot()">DOWNLOAD SNAPSHOT</button>

    <div class="artifact">
      <h3 style="color:gold;">CREDENTIAL MATRIX (PREVIEW)</h3>
      ${artifactPreview}
      <div class="locked">Full artifact locked 🔒</div>
    </div>

    <br>

    <button onclick="checkout()">UNLOCK FULL ARTIFACT</button>
  `;
}

// SNAPSHOT
function downloadSnapshot(){
  html2canvas(document.getElementById("snapshot")).then(canvas=>{
    const link = document.createElement("a");
    link.download = "stackory_snapshot.png";
    link.href = canvas.toDataURL();
    link.click();
  });
}

// STRIPE
function checkout(){
  window.location.href="https://buy.stripe.com/28E9AM2jP4NnanG6tY3gk0d";
}

</script>

</body>
</html>
