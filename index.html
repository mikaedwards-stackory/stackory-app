<!DOCTYPE html>
<html>
<head>
  <title>STACKORY™ SYSTEM</title>

  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

  <style>
    body {
      background:#000;
      color:#fff;
      font-family:-apple-system, sans-serif;
      max-width:650px;
      margin:auto;
      padding:30px;
    }

    h2 { text-align:center; color:gold; }

    select, button {
      width:100%;
      padding:14px;
      margin-bottom:15px;
      border-radius:8px;
      border:none;
      background:#111;
      color:#fff;
    }

    button {
      background:gold;
      color:black;
      font-weight:bold;
      cursor:pointer;
    }

    #output {
      display:none;
      margin-top:25px;
      border:2px solid gold;
      padding:20px;
      border-radius:12px;
    }

    .progress-bar {
      width:100%;
      background:#111;
      border-radius:10px;
      overflow:hidden;
      margin-top:10px;
    }

    .progress-fill {
      height:10px;
      background:gold;
    }

    .artifact {
      margin-top:20px;
      padding:20px;
      border:2px solid gold;
      border-radius:12px;
      background:#0a0a0a;
    }

    .locked {
      text-align:center;
      color:#666;
      margin-top:10px;
      font-size:13px;
    }
  </style>
</head>

<body>

<h2>STACKORY™ SYSTEM</h2>

<select id="domain" onchange="updateCerts()">
  <option value="">Select Domain</option>
  <option value="ENGINEERING">Engineering</option>
  <option value="PM">Project Management</option>
  <option value="DESIGN">Design / UX</option>
  <option value="MARKETING">Marketing</option>
  <option value="ESG">ESG / Sustainability</option>
  <option value="OPS">Operations</option>
  <option value="DATA">Data & Analytics</option>
  <option value="HEALTH">Healthcare</option>
</select>

<select id="cert">
  <option value="">Select Certification</option>
</select>

<select id="experience">
  <option value="">Experience Level</option>
  <option value="0-1">0–1 years</option>
  <option value="2-3">2–3 years</option>
  <option value="4-6">4–6 years</option>
  <option value="7+">7+ years</option>
</select>

<select id="hours">
  <option value="">Weekly Study Commitment</option>
  <option value="3">Light (2–4 hrs/week)</option>
  <option value="7">Moderate (5–8 hrs/week)</option>
  <option value="12">Focused (9–12 hrs/week)</option>
  <option value="15">Accelerated (12+ hrs/week)</option>
</select>

<button onclick="generate()">ASSIGN POSITION</button>

<div id="output"></div>

<script>

// 🔥 CERT DATA (ACRONYM + FULL NAME + LEVEL)
const certData = {

  PMP:{name:"Project Management Professional", level:"Advanced"},
  GOOGLE_PM:{name:"Google Project Management Certificate", level:"Entry"},

  GOOGLE_UX:{name:"Google UX Design Certificate", level:"Entry"},
  ADOBE:{name:"Adobe Certified Professional", level:"Entry"},

  HUBSPOT:{name:"HubSpot Marketing Certification", level:"Entry"},

  GRI:{name:"Global Reporting Initiative Certification", level:"Professional"},

  SSGB:{name:"Six Sigma Green Belt", level:"Professional"},

  GOOGLE_DA:{name:"Google Data Analytics Certificate", level:"Entry"},

  FE:{name:"Fundamentals of Engineering", level:"Entry"},
  PE:{name:"Professional Engineer", level:"Advanced"},

  CNA:{name:"Certified Nursing Assistant", level:"Entry"},
  LPN:{name:"Licensed Practical Nurse", level:"Entry"},
  RN:{name:"Registered Nurse", level:"Professional"},
  BSN:{name:"Bachelor of Science in Nursing", level:"Professional"},
  NP:{name:"Nurse Practitioner", level:"Advanced"},
  CCRN:{name:"Critical Care Registered Nurse", level:"Advanced"},
  CRA:{name:"Clinical Research Associate", level:"Professional"},
  USMLE:{name:"United States Medical Licensing Examination", level:"Executive"}
};

// 🔥 DOMAIN MAP
const certMap = {
  ENGINEERING:["FE","PE"],
  PM:["PMP","GOOGLE_PM"],
  DESIGN:["GOOGLE_UX","ADOBE"],
  MARKETING:["HUBSPOT"],
  ESG:["GRI"],
  OPS:["SSGB"],
  DATA:["GOOGLE_DA"],
  HEALTH:["CNA","LPN","RN","BSN","NP","CCRN","CRA","USMLE"]
};

// 🔥 UPDATE DROPDOWN (ACRONYM + NAME)
function updateCerts(){
  const domain = document.getElementById("domain").value;
  const cert = document.getElementById("cert");

  cert.innerHTML = `<option value="">Select Certification</option>`;

  certMap[domain]?.forEach(c=>{
    cert.innerHTML += `<option value="${c}">
      ${c} — ${certData[c].name}
    </option>`;
  });
}

// 🔥 SCORE
function computeScore(exp,hours){
  let score=0;

  if(exp==="0-1") score+=10;
  if(exp==="2-3") score+=20;
  if(exp==="4-6") score+=30;
  if(exp==="7+") score+=40;

  if(hours>=12) score+=30;
  else if(hours>=7) score+=20;
  else score+=10;

  return score;
}

// 🔥 ACCESS
function getAccess(score){
  if(score>=85) return {label:"EXECUTIVE", color:"gold"};
  if(score>=70) return {label:"BOARDROOM", color:"#fff"};
  if(score>=40) return {label:"CONDITIONAL", color:"gray"};
  return {label:"RESTRICTED", color:"red"};
}

// 🔥 RANK
function getRank(score){
  if(score>=90) return "Top 5%";
  if(score>=80) return "Top 10%";
  if(score>=70) return "Top 20%";
  if(score>=50) return "Top 40%";
  return "Below Top 50%";
}

// 🔥 CAREER INTELLIGENCE
function getCareerSignal(cert, exp){

  if(cert === "NP" && exp === "0-1"){
    return "⚠ You are attempting to skip RN/BSN and move directly to Nurse Practitioner";
  }

  if(cert === "PE" && exp === "0-1"){
    return "⚠ PE requires prior engineering fundamentals (FE recommended first)";
  }

  if(cert === "CRA" && exp === "0-1"){
    return "✓ Transition detected: Entry-level research → Clinical Research Associate pathway";
  }

  return "✓ No major transition risks detected";
}

// 🔥 MAIN
function generate(){

  const cert = document.getElementById("cert").value;
  const exp = document.getElementById("experience").value;
  const hours = parseInt(document.getElementById("hours").value);

  if(!cert || !exp || !hours){
    alert("Complete all fields");
    return;
  }

  const score = computeScore(exp,hours);
  const access = getAccess(score);
  const rank = getRank(score);
  const signal = getCareerSignal(cert, exp);

  const output = document.getElementById("output");
  output.style.display="block";

  output.innerHTML = `

  <div style="text-align:center; border:2px solid gold; padding:25px; border-radius:12px;">

    <h2 style="color:gold;">STACKORY™ SNAPSHOT</h2>

    <div style="font-size:40px;">${score}</div>
    <div>${rank}</div>

    <div style="margin-top:10px;">
      ${access.label}
    </div>

    <div style="margin-top:10px;">
      ${cert} — ${certData[cert].name}
    </div>

  </div>

  <div class="artifact">
    <h3 style="color:gold;">CAREER PATH SIGNAL</h3>
    <p>${signal}</p>

    <div class="locked">Full artifact locked 🔒</div>
  </div>

  <br>

  <button onclick="checkout()">UNLOCK FULL ARTIFACT</button>
  `;
}

// 🔥 CHECKOUT
function checkout(){

  const data = {
    cert: document.getElementById("cert").value,
    exp: document.getElementById("experience").value,
    hours: document.getElementById("hours").value,
    score: computeScore(
      document.getElementById("experience").value,
      parseInt(document.getElementById("hours").value)
    )
  };

  localStorage.setItem("stackory_user", JSON.stringify(data));

  window.location.href="https://buy.stripe.com/28E9AM2jP4NnanG6tY3gk0d";
}

</script>

</body>
</html>
