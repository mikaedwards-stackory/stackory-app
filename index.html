<!DOCTYPE html>
<html>
<head>
  <title>STACKORY™ SYSTEM</title>

  <style>
    body {
      background:#000;
      color:#fff;
      font-family:-apple-system;
      max-width:700px;
      margin:auto;
      padding:30px;
    }

    h2 { text-align:center; color:gold; }

    select, button {
      width:100%;
      padding:14px;
      margin-bottom:15px;
      border-radius:8px;
      border:none;
      background:#111;
      color:#fff;
    }

    button {
      background:gold;
      color:black;
      font-weight:bold;
      cursor:pointer;
    }

    #output {
      display:none;
      margin-top:20px;
      border:2px solid gold;
      padding:20px;
      border-radius:12px;
    }

    .artifact {
      margin-top:15px;
      padding:15px;
      border:2px solid gold;
      border-radius:12px;
      background:#0a0a0a;
    }

    .progress-bar {
      width:100%;
      background:#111;
      border-radius:10px;
      overflow:hidden;
      margin-top:10px;
    }

    .progress-fill {
      height:10px;
      background:gold;
    }

    .locked {
      color:#666;
      text-align:center;
      font-size:12px;
      margin-top:10px;
    }
  </style>
</head>

<body>

<h2>STACKORY™ SYSTEM</h2>

<select id="domain" onchange="updateCerts()">
  <option value="">DOMAIN</option>
  <option value="ENGINEERING">ENGINEERING</option>
  <option value="PM">PROJECT MANAGEMENT</option>
  <option value="DESIGN">DESIGN</option>
  <option value="MARKETING">MARKETING</option>
  <option value="ESG">ESG</option>
  <option value="OPS">OPERATIONS / EHS / SUPPLY</option>
  <option value="DATA">DATA</option>
  <option value="HEALTH">HEALTHCARE</option>
  <option value="LEGAL">LEGAL</option>
</select>

<select id="cert">
  <option value="">CERTIFICATION</option>
</select>

<select id="education">
  <option value="">EDUCATION</option>
  <option value="HS">HIGH SCHOOL</option>
  <option value="AA">ASSOCIATE</option>
  <option value="BA">BACHELOR</option>
  <option value="MS">MASTER+</option>
</select>

<select id="experience">
  <option value="">EXPERIENCE</option>
  <option value="0-1">0–1</option>
  <option value="2-3">2–3</option>
  <option value="4-6">4–6</option>
  <option value="7+">7+</option>
</select>

<select id="hours">
  <option value="">WEEKLY STUDY HOURS</option>
  <option value="3">2–4 HOURS</option>
  <option value="7">5–8 HOURS</option>
  <option value="12">9–12 HOURS</option>
  <option value="15">12+ HOURS</option>
</select>

<button onclick="generate()">ASSIGN POSITION</button>

<div id="output"></div>

<script>

// 🔥 CERT DATA

const certData = {

ENGINEERING: ["FE","EIT","PE","LEED","CEM","PMP_ENG","CAPM_ENG","CSWA"],
PM: ["CAPM","PMP","PRINCE2","PMI_ACP","CSM","PSM","SAFE","GOOGLE_PM"],
DESIGN: ["GOOGLE_UX","ADOBE","FIGMA","NNG","UXQB","IDF","HCI","WEBFLOW"],
MARKETING: ["HUBSPOT","GOOGLE_ADS","META","SEO","CONTENT","EMAIL","ANALYTICS","HOOTSUITE"],
ESG: ["GRI","SASB","TCFD","CFA_ESG","LEED_AP","ISSB","CARBON","SUSTAIN"],
OPS: ["SSGB","SSBB","CPIM","CSCP","CLTD","CSP","ASP","CIH","CHMM","OHST"],
DATA: ["GOOGLE_DA","IBM_DA","TABLEAU","POWERBI","SQL","PYTHON","AWS_DA","AZURE_DA"],
HEALTH: ["CNA","LPN","RN","BSN","NP","CCRN","PA","USMLE","CRA","PHARM"],
LEGAL: ["JD","BAR","LLM","CIPP","CFE","CAMS","CRISC","CHC","CCEP"]

};

const certNames = {

FE:"Fundamentals of Engineering",
EIT:"Engineer in Training",
PE:"Professional Engineer",
LEED:"LEED Green Associate",

PMP_ENG:"Project Management Professional",
CAPM_ENG:"Associate Project Management",
CSWA:"SolidWorks Associate",

GRI:"GRI",

CARBON:"Carbon",

SSGB:"Six Sigma Green Belt",

// 🔥 UPDATE CERTS

function updateCerts(){
  const domain = document.getElementById("domain").value;
  const cert = document.getElementById("cert");

  cert.innerHTML = `<option value="">CERTIFICATION</option>`;

  certData[domain]?.forEach(c=>{
    cert.innerHTML += `<option value="${c}">
      ${c} — ${certNames[c]}
    </option>`;
  });
}

// 🔥 SCORE

function computeScore(exp,hours){
  let score = 0;

  if(exp==="0-1") score+=10;
  if(exp==="2-3") score+=20;
  if(exp==="4-6") score+=30;
  if(exp==="7+") score+=40;

  if(hours>=12) score+=30;
  else if(hours>=7) score+=20;
  else score+=10;

  return score;
}

// 🔥 MAIN

function generate(){

  const cert = document.getElementById("cert").value;
  const exp = document.getElementById("experience").value;
  const hours = parseInt(document.getElementById("hours").value);

  if(!cert || !exp || !hours){
    alert("INPUT REQUIRED");
    return;
  }

  const score = computeScore(exp,hours);

  const output = document.getElementById("output");
  output.style.display = "block";

  output.innerHTML = `
    <h3 style="color:gold;">STACKORY™ INDEX: ${score}</h3>

    <div class="progress-bar">
      <div class="progress-fill" style="width:${score}%"></div>
    </div>

    <div class="artifact">PATHWAY<br>[${cert}]</div>
    <div class="artifact">STATE<br>${score>=70?"ACCESS":"RESTRICTED"}</div>

    <div class="locked">EXECUTION LOCKED</div>

    <button onclick="checkout()">UNLOCK</button>
  `;
}

// 🔥 CHECKOUT

function checkout(){

  localStorage.setItem("stackory_user", JSON.stringify({
    cert: document.getElementById("cert").value,
    score: computeScore(
      document.getElementById("experience").value,
      parseInt(document.getElementById("hours").value)
    )
  }));

  window.location.href = "https://buy.stripe.com/28E9AM2jP4NnanG6tY3gk0d";
}

</script>

</body>
</html>
