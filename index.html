<!DOCTYPE html>
<html>
<head>
  <title>STACKORY™ SYSTEM</title>

  <!-- SNAPSHOT LIBRARY -->
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

  <style>
    body {
      background:#000;
      color:#fff;
      font-family:-apple-system, sans-serif;
      max-width:650px;
      margin:auto;
      padding:30px;
    }

    h2 { text-align:center; color:gold; }

    select, button {
      width:100%;
      padding:14px;
      margin-bottom:15px;
      border-radius:8px;
      border:none;
      background:#111;
      color:#fff;
    }

    button {
      background:gold;
      color:black;
      font-weight:bold;
      cursor:pointer;
    }

    #output {
      display:none;
      margin-top:25px;
      border:2px solid gold;
      padding:20px;
      border-radius:12px;
    }

    .row {
      display:flex;
      justify-content:space-between;
      padding:10px 0;
      border-bottom:1px solid #222;
    }

    .label { color:#aaa; }
    .value { font-weight:bold; }

    .badge {
      text-align:center;
      margin:15px 0;
      font-weight:bold;
      font-size:18px;
    }

    .snapshot {
      margin-top:20px;
      padding:20px;
      border:2px solid gold;
      border-radius:12px;
      text-align:center;
      background:#000;
    }

    .locked {
      text-align:center;
      color:#666;
      margin-top:15px;
      font-size:13px;
    }
  </style>
</head>

<body>

<h2>STACKORY™ SYSTEM</h2>

<select id="domain" onchange="updateCerts()">
  <option value="">Select Domain</option>
  <option value="ENGINEERING">Engineering</option>
  <option value="PM">Project Management</option>
  <option value="DESIGN">Design / UX</option>
  <option value="MARKETING">Marketing</option>
  <option value="ESG">ESG / Sustainability</option>
  <option value="OPS">Operations</option>
  <option value="DATA">Data & Analytics</option>
  <option value="HEALTH">Healthcare</option>
</select>

<select id="cert">
  <option value="">Select Certification</option>
</select>

<select id="experience">
  <option value="">Experience Level</option>
  <option value="0-1">0–1 years</option>
  <option value="2-3">2–3 years</option>
  <option value="4-6">4–6 years</option>
  <option value="7+">7+ years</option>
</select>

<select id="hours">
  <option value="">Weekly Study Commitment</option>
  <option value="3">Light (2–4 hrs/week)</option>
  <option value="7">Moderate (5–8 hrs/week)</option>
  <option value="12">Focused (9–12 hrs/week)</option>
  <option value="15">Accelerated (12+ hrs/week)</option>
</select>

<button onclick="generate()">ASSIGN POSITION</button>

<div id="output"></div>

<script>

// CERT MAP
const certMap = {
  ENGINEERING:["FE","PE","SSGB","SSBB","PMP"],
  PM:["PMP","CAPM","PMI_ACP","GOOGLE_PM","PRINCE2"],
  DESIGN:["GOOGLE_UX","ADOBE"],
  MARKETING:["HUBSPOT","GOOGLE_DM"],
  ESG:["GRI","CFA_ESG"],
  OPS:["SSGB","SSBB"],
  DATA:["GOOGLE_DA","POWERBI"],
  HEALTH:["RN","NP","CCRN","USMLE"]
};

// CERT NAMES
const certNames = {
  FE:"Fundamentals of Engineering",
  PE:"Professional Engineer",
  PMP:"PMP",
  GOOGLE_PM:"Google Project Management",
  GOOGLE_UX:"Google UX Design",
  ADOBE:"Adobe Certified Professional",
  HUBSPOT:"HubSpot",
  RN:"Registered Nurse",
  NP:"Nurse Practitioner",
  CCRN:"Critical Care RN",
  USMLE:"USMLE"
};

// DROPDOWN
function updateCerts(){
  const domain = document.getElementById("domain").value;
  const cert = document.getElementById("cert");
  cert.innerHTML = `<option value="">Select Certification</option>`;

  certMap[domain]?.forEach(c=>{
    cert.innerHTML += `<option value="${c}">${certNames[c]}</option>`;
  });
}

// INDEX
function computeScore(exp,hours){
  let score=0;

  if(exp==="0-1") score+=10;
  if(exp==="2-3") score+=20;
  if(exp==="4-6") score+=30;
  if(exp==="7+") score+=40;

  if(hours>=12) score+=30;
  else if(hours>=7) score+=20;
  else score+=10;

  return score;
}

// READINESS
function classify(score){
  if(score>=70) return "READY";
  if(score>=40) return "CONDITIONAL";
  return "NOT_READY";
}

// ACCESS
function getAccess(score){
  if(score>=85) return {label:"EXECUTIVE ACCESS", color:"gold"};
  if(score>=70) return {label:"BOARDROOM ACCESS", color:"#fff"};
  if(score>=40) return {label:"CONDITIONAL ACCESS", color:"gray"};
  return {label:"NO ACCESS", color:"red"};
}

// MAIN
function generate(){

  const cert = document.getElementById("cert").value;
  const exp = document.getElementById("experience").value;
  const hours = parseInt(document.getElementById("hours").value);

  if(!cert || !exp || !hours){
    alert("Complete all fields");
    return;
  }

  const index = computeScore(exp,hours);
  const readiness = classify(index);
  const access = getAccess(index);

  const output = document.getElementById("output");
  output.style.display="block";

  output.innerHTML = `
    <div class="badge">Stackory™ Readiness: ${readiness}</div>

    <div class="row">
      <div class="label">Stackory™ Index</div>
      <div class="value">${index}</div>
    </div>

    <div class="row">
      <div class="label">Position Assigned</div>
      <div class="value">${certNames[cert]}</div>
    </div>

    <div class="row">
      <div class="label">Boardroom Access™</div>
      <div class="value" style="color:${access.color}">
        ${access.label}
      </div>
    </div>

    <!-- SNAPSHOT -->
    <div id="snapshot" class="snapshot">
      <h3 style="color:gold;">STACKORY™ SNAPSHOT</h3>
      <p>Index: ${index}</p>
      <p>Access: ${access.label}</p>
      <p>Position: ${certNames[cert]}</p>
    </div>

    <button onclick="downloadSnapshot()">DOWNLOAD SNAPSHOT</button>

    <div class="locked">
      Execution Tracks™ unlock after activation
    </div>

    <br>

    <button onclick="checkout()">UNLOCK EXECUTION</button>
  `;
}

// DOWNLOAD SNAPSHOT
function downloadSnapshot(){
  html2canvas(document.getElementById("snapshot")).then(canvas=>{
    const link = document.createElement("a");
    link.download = "stackory_snapshot.png";
    link.href = canvas.toDataURL();
    link.click();
  });
}

// STRIPE
function checkout(){
  window.location.href="https://buy.stripe.com/28E9AM2jP4NnanG6tY3gk0d";
}

</script>

</body>
</html>
