<!DOCTYPE html>
<html>
<head>
  <title>STACKORY™ SYSTEM</title>

  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

  <style>
    body {
      background:#000;
      color:#fff;
      font-family:-apple-system, sans-serif;
      max-width:650px;
      margin:auto;
      padding:30px;
    }

    h2 { text-align:center; color:gold; }

    select, button {
      width:100%;
      padding:14px;
      margin-bottom:15px;
      border-radius:8px;
      border:none;
      background:#111;
      color:#fff;
    }

    button {
      background:gold;
      color:black;
      font-weight:bold;
      cursor:pointer;
    }

    #output {
      display:none;
      margin-top:25px;
      border:2px solid gold;
      padding:20px;
      border-radius:12px;
    }

    .row {
      display:flex;
      justify-content:space-between;
      padding:10px 0;
      border-bottom:1px solid #222;
    }

    .label { color:#aaa; }

    .progress-bar {
      width:100%;
      background:#111;
      border-radius:10px;
      overflow:hidden;
      margin-top:10px;
    }

    .progress-fill {
      height:10px;
      background:gold;
    }

    .artifact {
      margin-top:20px;
      padding:20px;
      border:2px solid gold;
      border-radius:12px;
      background:#0a0a0a;
    }

    .locked {
      text-align:center;
      color:#666;
      margin-top:10px;
      font-size:13px;
    }
  </style>
</head>

<body>

<h2>STACKORY™ SYSTEM</h2>

<select id="domain" onchange="updateCerts()">
  <option value="">Select Domain</option>
  <option value="ENGINEERING">Engineering</option>
  <option value="PM">Project Management</option>
  <option value="DESIGN">Design / UX</option>
  <option value="MARKETING">Marketing</option>
  <option value="ESG">ESG / Sustainability</option>
  <option value="OPS">Operations</option>
  <option value="DATA">Data & Analytics</option>
  <option value="HEALTH">Healthcare</option>
</select>

<select id="cert">
  <option value="">Select Certification</option>
</select>

<select id="experience">
  <option value="">Experience Level</option>
  <option value="0-1">0–1 years</option>
  <option value="2-3">2–3 years</option>
  <option value="4-6">4–6 years</option>
  <option value="7+">7+ years</option>
</select>

<select id="hours">
  <option value="">Weekly Study Commitment</option>
  <option value="3">Light (2–4 hrs/week)</option>
  <option value="7">Moderate (5–8 hrs/week)</option>
  <option value="12">Focused (9–12 hrs/week)</option>
  <option value="15">Accelerated (12+ hrs/week)</option>
</select>

<button onclick="generate()">ASSIGN POSITION</button>

<div id="output"></div>

<script>

// 🔥 CERT DATA
const certData = {
  PMP:{name:"PMP", difficulty:8, salary:9, time:6},
  GOOGLE_PM:{name:"Google PM", difficulty:4, salary:5, time:2},
  GOOGLE_UX:{name:"Google UX", difficulty:5, salary:6, time:3},
  ADOBE:{name:"Adobe", difficulty:4, salary:5, time:2},
  HUBSPOT:{name:"HubSpot", difficulty:3, salary:5, time:1},
  GRI:{name:"GRI", difficulty:6, salary:7, time:4},
  SSGB:{name:"Six Sigma Green Belt", difficulty:6, salary:7, time:4},
  GOOGLE_DA:{name:"Google Data Analytics", difficulty:5, salary:7, time:3},

  FE:{name:"FE", difficulty:7, salary:8, time:6},
  PE:{name:"PE", difficulty:9, salary:10, time:12},

  CNA:{name:"CNA", difficulty:3, salary:4, time:2},
  LPN:{name:"LPN", difficulty:5, salary:6, time:4},
  RN:{name:"RN", difficulty:6, salary:7, time:6},
  BSN:{name:"BSN", difficulty:7, salary:8, time:8},
  NP:{name:"NP", difficulty:9, salary:10, time:12},
  CCRN:{name:"CCRN", difficulty:8, salary:9, time:6},
  CRA:{name:"CRA", difficulty:7, salary:8, time:5},
  USMLE:{name:"Physician", difficulty:10, salary:10, time:24}
};

// 🔥 DOMAIN MAP
const certMap = {
  ENGINEERING:["FE","PE"],
  PM:["PMP","GOOGLE_PM"],
  DESIGN:["GOOGLE_UX","ADOBE"],
  MARKETING:["HUBSPOT"],
  ESG:["GRI"],
  OPS:["SSGB"],
  DATA:["GOOGLE_DA"],
  HEALTH:["CNA","LPN","RN","BSN","NP","CCRN","CRA","USMLE"]
};

function updateCerts(){
  const domain = document.getElementById("domain").value;
  const cert = document.getElementById("cert");
  cert.innerHTML = `<option value="">Select Certification</option>`;

  certMap[domain]?.forEach(c=>{
    cert.innerHTML += `<option value="${c}">${certData[c].name}</option>`;
  });
}

// 🔥 SCORE
function computeScore(exp,hours){
  let score=0;

  if(exp==="0-1") score+=10;
  if(exp==="2-3") score+=20;
  if(exp==="4-6") score+=30;
  if(exp==="7+") score+=40;

  if(hours>=12) score+=30;
  else if(hours>=7) score+=20;
  else score+=10;

  return score;
}

// 🔥 ACCESS
function getAccess(score){
  if(score>=85) return {label:"EXECUTIVE", color:"gold"};
  if(score>=70) return {label:"BOARDROOM", color:"#fff"};
  if(score>=40) return {label:"CONDITIONAL", color:"gray"};
  return {label:"RESTRICTED", color:"red"};
}

// 🔥 RANK
function getRank(score){
  if(score>=90) return "Top 5%";
  if(score>=80) return "Top 10%";
  if(score>=70) return "Top 20%";
  if(score>=50) return "Top 40%";
  return "Below Top 50%";
}

// 🔥 GENERATE
function generate(){

  const cert = document.getElementById("cert").value;
  const exp = document.getElementById("experience").value;
  const hours = parseInt(document.getElementById("hours").value);

  if(!cert || !exp || !hours){
    alert("Complete all fields");
    return;
  }

  const score = computeScore(exp,hours);
  const access = getAccess(score);
  const rank = getRank(score);

  const output = document.getElementById("output");
  output.style.display="block";

  output.innerHTML = `

  <div id="snapshot" style="
    background:#000;
    color:#fff;
    padding:30px;
    border-radius:16px;
    border:2px solid gold;
    text-align:center;
  ">

    <div style="color:gold;">STACKORY™ SYSTEM</div>
    <h2 style="color:gold;">SNAPSHOT REPORT</h2>

    <div style="
      padding:8px 18px;
      border-radius:20px;
      margin:10px;
      font-weight:bold;
      background:${access.color==="gold"?"gold":"#222"};
      color:${access.color==="gold"?"#000":access.color};
    ">
      ${access.label}
    </div>

    <div style="font-size:40px;">${score}</div>
    <div style="color:#aaa;">STACKORY™ INDEX</div>
    <div>${rank}</div>

    <div class="progress-bar">
      <div class="progress-fill" style="width:${score}%"></div>
    </div>

    <div style="margin-top:10px;">
      POSITION: ${certData[cert].name}
    </div>

    <div style="margin-top:10px;">
      ${score>=70 ? "Boardroom Eligible" : "Boardroom Restricted"}
    </div>

  </div>

  <button onclick="downloadSnapshot()">DOWNLOAD SNAPSHOT</button>

  <div style="text-align:center; margin-top:15px; color:#aaa;">
    Your current position limits access to higher-tier opportunities
  </div>

  <div class="artifact">
    <h3 style="color:gold;">CREDENTIAL MATRIX (PREVIEW)</h3>
    <p>✔ Complexity: ${certData[cert].difficulty}/10</p>
    <p>✔ Market Value: ${certData[cert].salary}/10</p>
    <p>✔ Time: ${certData[cert].time} months</p>

    <div class="locked">Full artifact locked 🔒</div>
  </div>

  <div style="text-align:center; font-size:12px; color:#666;">
    Full artifact reveals positioning gaps, execution path, and authority signals
  </div>

  <br>

  <button onclick="checkout()">UNLOCK FULL ARTIFACT</button>
  `;
}

// 🔥 SNAPSHOT
function downloadSnapshot(){
  const el = document.getElementById("snapshot");

  setTimeout(()=>{
    html2canvas(el,{backgroundColor:"#000",scale:2}).then(canvas=>{
      const link = document.createElement("a");
      link.download="stackory_snapshot.png";
      link.href=canvas.toDataURL();
      link.click();
    });
  },300);
}

// 🔥 CHECKOUT
function checkout(){

  const data = {
    cert: document.getElementById("cert").value,
    exp: document.getElementById("experience").value,
    hours: document.getElementById("hours").value,
    score: computeScore(
      document.getElementById("experience").value,
      parseInt(document.getElementById("hours").value)
    )
  };

  localStorage.setItem("stackory_user", JSON.stringify(data));

  window.location.href="https://buy.stripe.com/28E9AM2jP4NnanG6tY3gk0d";
}

</script>

</body>
</html>
